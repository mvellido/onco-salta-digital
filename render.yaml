services:
  - type: web
    name: onco-salta-api
    env: node
    region: oregon
    plan: free
    root: apps/api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: "<YOUR_SUPABASE_URL>"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "<YOUR_SUPABASE_SERVICE_ROLE_KEY>"
